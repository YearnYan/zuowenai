name = "zuowenai"
main = "worker.js"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "zuowen.gongtouai.top", custom_domain = true }
]

[assets]
directory = "dist"
binding = "ASSETS"

[vars]
OPENAI_BASE_URL = "https://api.linapi.net/v1"
OPENAI_MODEL = "gemini-3-flash-preview"
